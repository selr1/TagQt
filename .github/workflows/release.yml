name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print debug info
        run: |
          echo "Tag: ${{ github.ref_name }}"
          python --version
        shell: bash

      - name: Verify icon assets
        run: |
          $icons = @(
            "assets\logo.ico",
            "assets\logo.png",
            "assets\logo_16.png",
            "assets\logo_32.png",
            "assets\logo_48.png",
            "assets\logo_64.png",
            "assets\logo_128.png",
            "assets\logo_256.png",
            "assets\logo_512.png",
            "assets\logo.svg"
          )
          $missing = $false
          foreach ($f in $icons) {
            if (Test-Path $f) {
              Write-Host "OK: $f"
            } else {
              Write-Host "MISSING: $f"
              $missing = $true
            }
          }
          if ($missing) { exit 1 }
        shell: pwsh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        shell: bash

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed ^
            --name "TagQt" ^
            --icon "assets\logo.ico" ^
            --add-data "assets;assets" ^
            --add-data "tagqt\ui\assets;tagqt\ui\assets" ^
            --strip ^
            main.py
        shell: cmd

      - name: Rename output
        run: |
          move "dist\TagQt.exe" "dist\TagQt-windows-${{ github.ref_name }}.exe"
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/TagQt-windows-${{ github.ref_name }}.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print debug info
        run: |
          echo "Tag: ${{ github.ref_name }}"
          python3 --version

      - name: Verify icon assets
        run: |
          for f in \
            assets/logo.ico \
            assets/logo.png \
            assets/logo_16.png \
            assets/logo_32.png \
            assets/logo_48.png \
            assets/logo_64.png \
            assets/logo_128.png \
            assets/logo_256.png \
            assets/logo_512.png \
            assets/logo.svg; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            else
              echo "OK: $f"
            fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxkbcommon-x11-0 \
            libgl1 \
            libegl1 \
            libfontconfig1 \
            libdbus-1-3 \
            libxcb-xkb1 \
            fuse

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir \
            --name "TagQt" \
            --add-data "assets:assets" \
            --add-data "tagqt/ui/assets:tagqt/ui/assets" \
            --strip \
            main.py

      - name: Create AppDir structure
        run: |
          mkdir -p TagQt.AppDir/usr/bin
          cp -r dist/TagQt/* TagQt.AppDir/usr/bin/

          # Root icon (required by AppImage spec — must match Icon= in .desktop)
          cp assets/logo_256.png TagQt.AppDir/logo.png
          cp assets/logo_256.png TagQt.AppDir/TagQt.png

          # Icon hierarchy for system integration
          for size in 16 32 48 64 128 256 512; do
            dir="TagQt.AppDir/usr/share/icons/hicolor/${size}x${size}/apps"
            mkdir -p "$dir"
            cp "assets/logo_${size}.png" "$dir/logo.png"
          done
          mkdir -p TagQt.AppDir/usr/share/icons/hicolor/scalable/apps
          cp assets/logo.svg TagQt.AppDir/usr/share/icons/hicolor/scalable/apps/logo.svg

          # Create .desktop file
          cat > TagQt.AppDir/TagQt.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=TagQt
          Exec=TagQt
          Icon=logo
          Categories=Audio;AudioVideo;Music;
          Comment=A music metadata editor built with Python and Qt
          EOF
          sed -i 's/^          //' TagQt.AppDir/TagQt.desktop

          # Create AppRun
          cat > TagQt.AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/TagQt" "$@"
          EOF
          chmod +x TagQt.AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool --no-appstream TagQt.AppDir "TagQt-linux-${{ github.ref_name }}.AppImage"
          chmod +x "TagQt-linux-${{ github.ref_name }}.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: TagQt-linux-${{ github.ref_name }}.AppImage
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-assets/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release-assets/

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TagQt ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
